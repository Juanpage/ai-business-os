# ============================================================================
# AI Business OS — Orquestacion local
# Servicios: postgres (DB) + api (NestJS) + web (Next.js)
# Uso: docker-compose up --build
# ============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: aibos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aibos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aibos}
      POSTGRES_DB: ${POSTGRES_DB:-aibos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - aibos-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aibos} -d ${POSTGRES_DB:-aibos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aibos-api
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-aibos}:${POSTGRES_PASSWORD:-aibos}@postgres:5432/${POSTGRES_DB:-aibos}?schema=public"
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-cambia-este-secreto-en-produccion}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aibos-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  aibos-pgdata:
    name: aibos-pgdata
